<form id="contactForm" data-aos="fade-up">
    <div class="container">
        <div class="form-section">
            <div class="form-title">Get In Touch</div>
            <div class="form-grid">
                <input type="text" id="name" placeholder="Your Name" required>
                <input type="email" id="email" placeholder="Your Email" required>
                <input type="text" id="phone" placeholder="Your Phone">
                <input type="text" id="subject" placeholder="Your Subject">
                <textarea id="message" placeholder="Write Message" required></textarea>
            </div>
            <button type="submit" class="nut">Send Message</button>
        </div>

        <div class="contact-box">
            <div class="box-title">Don't Hesitate To Contact Us</div>
            <div class="contact-item">
                <div class="icon">🏠</div>
                <div>
                    <strong>Locations</strong><br>
                    123 Main Street, City, Country,<br>
                </div>
            </div>
            <div class="contact-item">
                <div class="icon">📞</div>
                <div>
                    <strong>Hotline</strong><br>
                    84 123 456 789<br>
                </div>
            </div>
            <div class="contact-item">
                <div class="icon">✉</div>
                <div>
                    <strong>Support</strong><br>
                    support@gmail.com<br>
                </div>
            </div>
        </div>
    </div> </form> <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init();
</script>

<script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
        e.preventDefault();

        
        const formData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            subject: document.getElementById('subject').value,
            message: document.getElementById('message').value
        };

        
        fetch('https://formspree.io/f/xwvjnzkr', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify(formData) 
        })
        .then(response => {
            if (response.ok) {
                alert('🎉 Gửi thông tin liên hệ thành công về Gmail!');
                document.getElementById('contactForm').reset(); // xóa dữ liệu cũ
            } else {
                alert('❌ Gửi dữ liệu thất bại');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('❌ Đã xảy ra lỗi kết nối mạng!');
        });
    });
</script>
